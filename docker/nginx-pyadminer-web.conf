gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;

server {
    listen 80;
    # For production TLS termination / vhost, set e.g.:
    # server_name py-adminer.erevolutionsindia.com;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static marketing site (HTML/CSS/JS)
    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=86400";
    }

    # Cache static assets lightly (optional)
    location ~* \.(css|js|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
