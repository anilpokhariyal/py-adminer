name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MySQL client build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check pyadminer tests && ruff format --check pyadminer tests

      - name: Pytest
        env:
          SECRET_KEY: ci-test-secret-key
          MYSQL_TEST_HOST: 127.0.0.1
          MYSQL_TEST_PORT: "3306"
          MYSQL_TEST_USER: root
          MYSQL_TEST_PASSWORD: test
          MYSQL_TEST_DATABASE: testdb
        run: pytest tests -v
