<div class="row mt-4 p-4">
    <h4 class="col-md-12 py-2 px-3 mb-3 border rounded bg-light text-dark font-weight-bold">
        {% if create == 'database' %} Create {% elif create == 'alter_database' %} Alter {% endif %} Database
    </h4>
    <div class="col-md-12 mt-4">
        <form method="POST" name="create_database" action="/create_database">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <span class="col-md-4">
            <input type="text" name="database_name" placeholder="database name" value="{% if selected_db %}{{selected_db}}{% endif %}" required>
        </span>
        <span class="col-md-6">
            <input type="hidden" name="alter_db_name" value="{{selected_db}}">
            <select name="database_collection">
                <option value="|">(collection)</option>
                {% for key, collations in db_collations.items() %}
                    <optgroup label="{{key}}">
                        {{key}}
                    {% for collation in collations %}
                        <option value="{{ key }}|{{ collation['COLLATION_NAME'] }}">{{collation['COLLATION_NAME']}}</option>
                    {% endfor %}
                    </optgroup>
                {% endfor %}
            </select>
        </span>
        <span class="col-md-2">
            <button type="submit" class="btn btn-primary">Save</button>
        </span>
        </form>
    </div>
</div>
